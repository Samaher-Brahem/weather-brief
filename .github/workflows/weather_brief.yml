name: Daily Weather Brief

on:
  schedule:
    - cron: '59 * * * *'   # Every hour at minute 59 (UTC)
  workflow_dispatch:

jobs:
  send_weather_brief:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
      TZ: 'Europe/Brussels'   # Affects displayed time only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Debug environment & time
        run: |
          echo "🔍 Checking environment variables..."
          echo "GROQ length: ${#GROQ_API_KEY}"
          echo "GMAIL_USER set: $([ -n "$GMAIL_USER" ] && echo YES || echo NO)"
          echo "RECIPIENT_EMAIL set: $([ -n "$RECIPIENT_EMAIL" ] && echo YES || echo NO)"

          echo ""
          echo "================ TIME DEBUG ================"
          echo "UTC now:        $(date -u +"%Y-%m-%d %H:%M:%S %Z")"
          echo "Brussels time:  $(date +"%Y-%m-%d %H:%M:%S %Z")"
          echo "Epoch time:     $(date +%s)"
          echo "==========================================="

      - name: Show GitHub event context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Triggered at (GitHub): ${{ github.run_started_at }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather brief
        run: |
          echo "🚀 Script execution starting at: $(date +"%Y-%m-%d %H:%M:%S %Z")"
          python main.py
          echo "✅ Script completed at: $(date +"%Y-%m-%d %H:%M:%S %Z")"