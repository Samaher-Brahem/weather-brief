name: Daily Weather Brief

on:
  schedule:
    - cron: '0 4 * * *'    # ~5:00 Brussels (safe)
    - cron: '30 5 * * *'   # ~6:30 Brussels backup
  workflow_dispatch:

jobs:
  send_weather_brief:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Debug environment
        run: |
          echo "🔍 Checking environment variables..."
          echo "GROQ length: ${#GROQ_API_KEY}"
          echo "GMAIL_USER set: $([ -n "$GMAIL_USER" ] && echo YES || echo NO)"
          echo "RECIPIENT_EMAIL set: $([ -n "$RECIPIENT_EMAIL" ] && echo YES || echo NO)"

          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌ GROQ_API_KEY is missing"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather brief
        run: python main.py