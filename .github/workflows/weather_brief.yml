name: Daily Weather Brief

on:
  schedule:
    - cron: '3 4 * * *'   # 6:03 Brussels (UTC+2)
  workflow_dispatch:

jobs:
  send_weather_brief:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
      TZ: 'Europe/Brussels'   # Important: set runner timezone

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Debug environment & time
        run: |
          echo "🔍 Checking environment variables..."
          echo "GROQ length: ${#GROQ_API_KEY}"
          echo "GMAIL_USER set: $([ -n "$GMAIL_USER" ] && echo YES || echo NO)"
          echo "RECIPIENT_EMAIL set: $([ -n "$RECIPIENT_EMAIL" ] && echo YES || echo NO)"
          
          echo "🕒 Current Brussels time: $(date +"%Y-%m-%d %H:%M:%S %Z")"

          # Only continue if within 5:00-6:30 Brussels time
          current_hour=$(date +"%H")
          current_minute=$(date +"%M")
          if [ "$current_hour" -lt 5 ] || [ "$current_hour" -gt 6 ] || \
             { [ "$current_hour" -eq 6 ] && [ "$current_minute" -gt 30 ]; }; then
            echo "⚠️ Outside target time window. Exiting."
            exit 0
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather brief
        run: python main.py